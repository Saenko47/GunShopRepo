<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="CSS/Profile.css">
    <link rel="stylesheet" href="CSS/MainStyle.css">
    <link rel="stylesheet" href="CSS/FormStyle.css">
    <link rel="stylesheet" href="CSS/PurchaseHistory.css">
</head>
<body>

    <!-- HEADER -->
      <div class ="headerBox" id = "headerBoxId">
        <div class = "menu">
       <a href = "MainPage.html" class="menuLink">Main Page</a>
       </div>
       </div>
   
    <!-- PROFILE -->
    <main class="profilePage">

        <!-- LEFT PANEL -->
        <section class="profileSidebar">
              <div id="overlay"></div>

            <div class="avatarBox">
                <div class="avatarCircle" id="avatarCircleId">
                    B
                </div>

                <h2 id="userName">Bebra Lenin</h2>
                <p id="userLogin">@bebralogin</p>
            </div>

            <button class="profileButton" id="editProfileBtnId">
                Edit profile
            </button>
            <button id = "addLicenseBtnId" class="profileButton">
                Add License
                </button>
            <button class="profileButton" id="LogoutBtnId">
                Log out
            </button>


        </section>
        <div id = "addLicenseFormId" class="UserLoginForm hidden">
            <form id = "addLicenseForm">

              <input type="text" placeholder="Enter license key" id = "licenseKeyInputId" class="searchInput">
              <select name="TypeOfLicense" id="licenseTypeSelect">
                <option value="0">For Pistol</option>
                <option value="1">For Rifle</option>
                <option value="2">For Shotgun</option>
              </select>
              <button id = "addLicenseSubmitBtn" class = "searchInput">Add License</button>
             
            </form>
            </div>

        <!-- RIGHT PANEL -->
        <section class="profileContent">

            <!-- USER INFO -->
            <div class="profileCard">

                <div class="cardHeader">
                    <h2>Customer Information</h2>
                </div>

                <div class="infoGrid">

                    <div class="infoItem">
                        <span class="infoTitle">Name</span>
                        <span class="infoValue" id="nameValue">
                            Bebra
                        </span>
                    </div>

                    <div class="infoItem">
                        <span class="infoTitle">Surname</span>
                        <span class="infoValue" id="surnameValue">
                            Lenon
                        </span>
                    </div>

                    <div class="infoItem">
                        <span class="infoTitle">Login</span>
                        <span class="infoValue" id="loginValue">
                            bebralogin
                        </span>
                    </div>

                    <div class="infoItem">
                        <span class="infoTitle">Gmail</span>
                        <span class="infoValue" id="gmailValue">
                            example@gmail.com
                        </span>
                    </div>

                    <div class="infoItem">
                        <span class="infoTitle">Phone Number</span>
                        <span class="infoValue" id="phoneValue">
                            +380000000000
                        </span>
                    </div>

                    <div class="infoItem">
                        <span class="infoTitle">Created At</span>
                        <span class="infoValue" id="createdAtValue">
                            2026-05-16
                        </span>
                    </div>

                </div>

            </div>

            <!-- LICENSES -->
            <div class="profileCard">

                <div class="cardHeader">
                    <h2>Licenses</h2>
                </div>

                <div class="licenseContainer" id="licenseContainer">

                    

                </div>

            </div>
            <button id="showPurchaseHistoryBtn" class="searchInput showFilter">Show Purchase History</button>

            <div id = "ProductPurchaseId" class = "UserLoginForm hidden">

            </div>
            <div class="profileCard">

  
<div id = "updateProfileFormId" class="UpdateForm hidden">
    <form id="updateProfileForm" >

        <div class="infoGrid">

            <div class="infoItem">
                <span class="infoTitle">Name</span>
                <input type="text" id="editName" class="searchInput">
            </div>

            <div class="infoItem">
                <span class="infoTitle">Surname</span>
                <input type="text" id="editSurname" class="searchInput">
            </div>

            <div class="infoItem">
                <span class="infoTitle">Gmail</span>
                <input type="email" id="editGmail" class="searchInput">
            </div>

            <div class="infoItem">
                <span class="infoTitle">Phone Number</span>
                <input type="text" id="editPhone" class="searchInput">
            </div>

          

        </div>

        <button type="submit" class="profileButton">
            Save Changes
        </button>

    </form>
</div>
</div>

        </section>

    </main>

     <script type="module" src="JS/profile.js"></script>
    <script type="module" src="JS/cookieRepos.js"></script>
    <script type="module" src="JS/glassEffect.js"></script>
    <script type="module" src="JS/purchaseHistory.js"></script>
    <script type="module" src="JS/changeCustomerProfile.js"></script>
    <script type="module" src="JS/addLicense.js"></script>
</body>
</html>
